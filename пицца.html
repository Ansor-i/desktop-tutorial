<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПИЦЦА</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background: #121212; 
            color: #e0e0e0;
        }

        .container {
            max-width: 1400px; 
            margin: auto;
            background: #1e1e1e; 
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { color: #ffffff; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        p { text-align: center; color: #bbb; }

        .product-grid {
            display: grid;
           
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px;
            margin-top: 40px;
        }

        .product-card {
            background: #252525;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: #ffc107;
            box-shadow: 0 0 15px rgba(255, 193, 7, 0.2);
        }

        .product-card img {
            width: 100%;
            height: 130px; 
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 10px;
            background: #333; 
        }

        .price {
            font-weight: bold;
            color: #00ff88;
            font-size: 1.2em;
            display: block;
            margin: 10px 0;
        }

        .buy-btn {
            background: #ffc107;
            color: #000;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8em;
        }

        .navbar {
    display: flex;
    justify-content: left;
    background: #1e1e1e;
    padding: 15px 0;
    position: sticky; 
    top: 0;
    z-index: 1000;
    border-bottom: 2px solid #ffc107;
    margin-bottom: 20px;
}

.navbar a {
    color: #fff;
    text-decoration: none;
    margin: 0 20px;
    font-weight: bold;
    text-transform: uppercase;
    transition: 0.3s;
}

.navbar a:hover {
    color: #ffc107; 
}

.navbar a.active {
    border-bottom: 2px solid #ffc107;
    padding-bottom: 5px;
}
        
        .buy-btn:hover { background: #fff; }

     
        @media (max-width: 900px) {
            .product-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
