<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НАПИТКИ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background: #121212; 
            color: #e0e0e0;
        }

        .container {
            max-width: 1400px;
            margin: auto;
            background: #1e1e1e; 
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { color: #ffffff; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        p { text-align: center; color: #bbb; }

        .product-grid {
            display: grid;
           
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px;
            margin-top: 40px;
        }

        .product-card {
            background: #252525;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: #ffc107;
            box-shadow: 0 0 15px rgba(255, 193, 7, 0.2);
        }

        .product-card img {
            width: 100%;
            height: 170px; 
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 20px;
            background: #333; 
        }

        .price {
            font-weight: bold;
            color: #00ff88;
            font-size: 1.2em;
            display: block;
            margin: 10px 0;
        }

        .buy-btn {
            background: #ffc107;
            color: #000;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8em;
        }

        .navbar {
    display: flex;
    justify-content: left;
    background: #1e1e1e;
    padding: 15px 0;
    position: sticky;
    top: 0;
    z-index: 1000;
    border-bottom: 2px solid #ffc107;
    margin-bottom: 20px;
}

.navbar a {
    color: #fff;
    text-decoration: none;
    margin: 0 20px;
    font-weight: bold;
    text-transform: uppercase;
    transition: 0.3s;
}

.navbar a:hover {
    color: #ffc107; 
}

.navbar a.active {
    border-bottom: 2px solid #ffc107;
    padding-bottom: 5px;
}
        
        .buy-btn:hover { background: #fff; }

       
        @media (max-width: 900px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <nav class="navbar">
    <a href="главний.html" class="active">🏠︎</a>
</nav>

<div class="container">
    <h1>Напитки</h1>
    <p>быстрая доставка.даже не успеешь жрат!!</p>

    <div class="product-grid">
       
        <div class="product-card">
            <img src="https://orderapp-app-static.burgerkingrus.ru/x256/catalog/images/group/9640434a44b2fcc0c01c651507229b13.png" alt="Пицца">
            <h3>Эвервесс Кола</h3><br>
            <form action="напиток1.html"><input type="submit" class="buy-btn" value="Подробнее" /></form>
        </div>

        <div class="product-card">
            <img src="https://orderapp-app-static.burgerkingrus.ru/x512/catalog/images/dishes/481e04b493aea61d750a884531a7931b.png" alt="Бургер">
            <h3>Фрустайл Апельсин</h3><br>
           <form action="напиток2.html"><input type="submit" class="buy-btn" value="Подробнее" /></form>
        </div>

        <div class="product-card">
            <img src="https://orderapp-app-static.burgerkingrus.ru/x256/catalog/images/dishes/2637112c77825985df924bb630a79273.png" alt="Суши">
            <h3>Вода Аква Минерале без газа 0,5л</h3>
            <form action="напиток3.html"><input type="submit" class="buy-btn" value="Подробнее" /></form>
        </div>

        <div class="product-card">
            <img src="https://orderapp-app-static.burgerkingrus.ru/x512/catalog/images/dishes/517170307c943f04742b0d593699bafc.png" alt="Стейк">
            <h3>Липтон Зеленый Чай в бут. 0,5л</h3><br>
            <form action="напиток4.html"><input type="submit" class="buy-btn" value="Подробнее" /></form>
        </div>

        <div class="product-card">
            <img src="https://orderapp-app-static.burgerkingrus.ru/x512/catalog/images/dishes/a2a6a51384a8233c86be279b002b00b6.png" alt="Десерт">

            <form action="напиток5.html"><input type="submit" class="buy-btn" value="Подробнее" /></form>
        </div>

        <div class="product-card">
            <img src="https://orderapp-app-static.burgerkingrus.ru/x256/catalog/images/dishes/fcfe6a83954b39158b497e5a7a52f53f.png" alt="Напиток">
            <h3>Flash Up 450 мл</h3><br>
            <form action="напиток6.html"><input type="submit" class="buy-btn" value="Подробнее" /></form>
        </div>
    </div>
</div>

</body>
</html>
