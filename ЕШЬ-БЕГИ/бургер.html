<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>БУРГЕРЫ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background: #121212; 
            color: #e0e0e0;
        }

        .container {
            max-width: 1400px; 
            margin: auto;
            background: #1e1e1e; 
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { color: #ffffff; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        p { text-align: center; color: #bbb; }

        .product-grid {
            display: grid;
          
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px;
            margin-top: 40px;
        }

        .product-card {
            background: #252525;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: #ffc107;
            box-shadow: 0 0 15px rgba(255, 193, 7, 0.2);
        }

        .product-card img {
            width: 100%;
            height: 170px; 
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 10px;
            background: #333; 
        }

        .price {
            font-weight: bold;
            color: #00ff88;
            font-size: 1.2em;
            display: block;
            margin: 10px 0;
        }

        .buy-btn {
            background: #ffc107;
            color: #000;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8em;
        }

        .navbar {
    display: flex;
    justify-content: left;
    background: #1e1e1e;
    padding: 15px 0;
    position: sticky; 
    top: 10;
    z-index: 1000;
    border-bottom: 2px solid #ffc107;
    margin-bottom: 20px;
}

.navbar a {
    color: #fff;
    text-decoration: none;
    margin: 0 20px;
    font-weight: bold;
    text-transform: uppercase;
    transition: 0.3s;
}

.navbar a:hover {
    color: #ffc107; 
}

.navbar a.active {
    border-bottom: 2px solid #ffc107;
    padding-bottom: 5px;
}
        
    .buy-btn:hover { 
    background: #fff; 
}

       
        @media (max-width: 900px) {
            .product-grid { 
            grid-template-columns: repeat(2, 1fr);
        }
        }
    </style>
</head>
<body>
    <nav class="navbar">
    <a href="главний.html" class="active">🏠︎</a>
</nav>


<div class="container">
    <h1>БУРГЕРЫ</h1>
    <p>быстрая доставка.даже не успеешь жрат!!</p>
    
    
    <div class="product-grid">
        <div class="product-card">
            <img src="https://orderapp-app-static.burgerkingrus.ru/x256/catalog/images/dishes/d0106b459d03ee292f2315469f918e8e.png" alt="бургер">
            <h3>Воппер Смоки Чеддер</h3><br>
            <form action="товар1.html"><input type="submit" class="buy-btn" value="Подробнее" /></form>
        </div>

        <div class="product-card">
            <img src="https://orderapp-app-static.burgerkingrus.ru/x256/catalog/images/group/52258b7200bdc3a90c757243dae7ea0b.png" alt="бургер">
            <h3>Ангус Чеддер-Бекон 314 г</h3><br>
          <form action="товар2.html"><input type="submit" class="buy-btn" value="Подробнее" /></form>
        </div>

        <div class="product-card">
            <img src=" https://orderapp-app-static.burgerkingrus.ru/x512/catalog/images/dishes/378b8c979cbd705be07d8411345859de.png" alt="бургер">
            <h3>Ангус Чеддер-Бекон Двойной 430 г</h3>
           <form action="товар3.html"><input type="submit" class="buy-btn" value="Подробнее" /></form>
        </div>

        <div class="product-card">
            <img src="https://orderapp-app-static.burgerkingrus.ru/x512/catalog/images/dishes/89879d2602a8e9eefb4234bceca7393c.png" alt="бургер">
            <h3>Воппер 274 г</h3><br>
            <form action="товар4.html"><input type="submit" class="buy-btn" value="Подробнее" /></form>
        </div>

        <div class="product-card">
            <img src="https://orderapp-app-static.burgerkingrus.ru/x512/catalog/images/dishes/bd9f6d4d70cd8a52c0f9176daa46ba2f.png" alt="бургер">
            <h3>Двойной Воппер с сыром 388 г</h3>
           <form action="товар5.html"><input type="submit" class="buy-btn" value="Подробнее" /></form>
        </div>

       <div class="product-card">
            <img src="https://orderapp-app-static.burgerkingrus.ru/x512/catalog/images/dishes/eeb52df9c7c954121e299cdeeb1016ed.png" alt="бургер">
            <h3>Ангус Пармеджано Двойной</h3>
           <form action="товар6.html"><input type="submit" class="buy-btn" value="Подробнее" /></form>
        </div>
    </div>
</div>


</body>
</html>
