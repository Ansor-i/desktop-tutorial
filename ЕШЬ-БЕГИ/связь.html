<style>
body {
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background-color: #302f2f; 
    color: #e0e0e0;
    margin: 0;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
}

.contact-container {
    max-width: 800px;
    width: 100%;
    text-align: center;
}

  nav a {
    color: rgb(248, 248, 248);
    text-decoration: center;
    margin: 0 30px;
    font-weight: 700;
    transition: 0.3s;
 }


        nav a:hover { color: var(--neon-yellow); }

h1 { color: #ffffff; margin-bottom: 10px; }
.subtitle { color: #b0b0b0; margin-bottom: 40px; }

.contact-methods {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 50px;
}

.contact-form {
    max-width: 550px; 
    margin: 0 auto;   
    background: #1e1e1e;
    padding: 15px;   
    border-radius: 15px;
    border: 1px solid #333;
}

.method-card {
    background: #1e1e1e;
    padding: 30px;
    border-radius: 20px;
    border: 1px solid #e6c50b;
    transition: all 0.3s ease;
}

.method-card:hover { 
    transform: translateY(-10px);
    border-color: #f1c70b;
    box-shadow: 0 10px 30px rgba(0, 123, 255, 0.2);
}

.icon { font-size: 50px; margin-bottom: 15px; display: block; }


.btn {
    display: inline-block;
    padding: 15px 25px;
    background: #12fd39;
    color: white;
    text-decoration: none;
    border-radius: 12px;
    margin-top: 15px;
    font-weight: 600;
    transition: 0.3s;
}

.btn.secondary1 { background:rgb(60, 157, 248)0; }
.btn.secondary { background: #3870c4; }

.btn:hover { opacity: 0.9; transform: scale(1.05); }


.contact-form {
    background: #1e1e1e;
    padding: 40px;
    border-radius: 20px;
    border: 10px solid #333;
    text-align: left;
}

.contact-form h2 {
    margin-top: 0;
    color: #fff;
    font-size: 24px;
}

form input, form textarea {
    width: 100%;
    padding: 14px;
    margin: 12px 0;
    background: #2a2a2a;
    border: 1px solid #444;
    border-radius: 10px;
    box-sizing: border-box;
    color: #fff;
    font-size: 16px;
    outline: none;
}

form input:focus, form textarea:focus {
    border-color: #c4e023;
    background: #333;
}


.submit-btn:hover {
    box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
    transform: translateY(-2px);
}


@media (max-width: 600px) {
    .contact-methods { grid-template-columns: 1fr; }
}
</style>

<div class="contact-container">
     <nav>
